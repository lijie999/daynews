<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DayNews 列表</title>
  <style>
    :root{
      --bg0:#070b16; --bg1:#0b1020; --stroke: rgba(255,255,255,.12);
      --text:#f2f6ff; --muted: rgba(242,246,255,.72);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --serif: ui-serif, "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      --r: 18px;
    }
    body{margin:0;color:var(--text);font-family:var(--sans);background:linear-gradient(180deg,var(--bg1),var(--bg0));}
    .wrap{max-width:1100px;margin:0 auto;padding:26px 18px 56px}
    header{border:1px solid var(--stroke);background:rgba(255,255,255,.06);border-radius:var(--r);padding:18px 16px;}
    h1{margin:8px 0 0;font-family:var(--serif);font-size: clamp(24px, 4vw, 40px);line-height:1.1}
    .sub{margin:8px 0 0;color:var(--muted);line-height:1.6;font-size:14px}
    .card{margin-top:14px;border:1px solid var(--stroke);background:rgba(255,255,255,.05);border-radius:var(--r);overflow:hidden}
    .card h2{margin:0;padding:14px 14px 12px;border-bottom:1px solid rgba(255,255,255,.10);font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.03em;display:flex;justify-content:space-between;align-items:center}
    .items{padding:12px 14px 16px;display:flex;flex-direction:column;gap:10px}
    .item{border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.12);border-radius:16px;padding:10px 10px}
    .top{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
    .src{font-family:var(--mono);font-size:11px;color:rgba(242,246,255,.52)}
    .time{font-family:var(--mono);font-size:11px;color:var(--muted)}
    .title{margin:6px 0 0;font-size:14px;font-weight:780;line-height:1.25}
    .meta{margin:6px 0 0;color:var(--muted);font-size:12.5px;line-height:1.45}
    a{color:inherit;text-decoration:none} a:hover{text-decoration:underline}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);padding:8px 12px;border-radius:999px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="row">
        <a class="btn" href="./home.html">首页</a>
        <a class="btn" href="./briefs.json">JSON</a>
      </div>
      <h1>DayNews 列表</h1>
      <p class="sub">按板块浏览。点击标题打开原文页面（详情页有“返回列表”）。</p>
    </header>

    <div id="app" class="note"></div>
  </div>

  <script>
  const escapeHtml = (s) => String(s||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");

  function renderSection(sec){
    const items = sec.items || [];
    const body = items.length ? items.map(it => {
      const href = it.url || "#";
      return `
        <div class="item">
          <div class="top"><div class="src">${escapeHtml(it.source)} · ${escapeHtml(it.ticker)}</div><div class="time">${escapeHtml(it.time)}</div></div>
          <a href="${href}" target="_blank" rel="noreferrer noopener"><div class="title">${escapeHtml(it.title)}</div></a>
          <p class="meta">${escapeHtml(it.summary)}</p>
        </div>`;
    }).join("\n") : `<div class="item"><div class="meta">（暂无）</div></div>`;

    return `
      <section class="card">
        <h2><span>${escapeHtml(sec.name)}</span><span>${escapeHtml(sec.badge||"")}</span></h2>
        <div class="items">${body}</div>
      </section>`;
  }

  fetch('./briefs.json', {cache:'no-store'})
    .then(r => r.json())
    .then(data => {
      const secs = data.sections || [];
      document.getElementById('app').innerHTML = secs.map(renderSection).join('');
    })
    .catch(err => {
      document.getElementById('app').innerHTML = `<div class="card"><h2><span>错误</span><span>load</span></h2><div class="items"><div class="item"><p class="meta">briefs.json 加载失败：${escapeHtml(err)}</p></div></div></div>`;
    });
  </script>
</body>
</html>
